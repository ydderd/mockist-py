name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Ruff lint
        run: uv run --python ${{ matrix.python-version }} ruff check

      - name: Ruff format
        run: uv run --python ${{ matrix.python-version }} ruff format --check

      - name: Typecheck
        run: uv run --python ${{ matrix.python-version }} basedpyright

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest

  smoke-pack:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Smoke-test packed wheel
        run: bash scripts/smoke_pack.sh
